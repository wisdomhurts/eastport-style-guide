<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eastport — Creative Explorations</title>
<link rel="icon" type="image/png" href="assets/logos/eastport-mark.png">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="explorations/explorations.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="explorations/image-slot.js"></script>
<style>
  /* Fixed back-link to the brand manual — sits above the pan/zoom canvas */
  .ce-back{position:fixed;top:16px;left:16px;z-index:9999;display:inline-flex;align-items:center;gap:9px;
    font-family:var(--font-sans,system-ui);font-size:12.5px;font-weight:600;letter-spacing:0.01em;
    color:#fff;background:var(--navy,#04214E);padding:8px 14px 8px 11px;border-radius:999px;
    box-shadow:0 6px 20px rgba(4,33,78,0.28);transition:background .2s,transform .2s;}
  .ce-back:hover{background:var(--azure,#156AF8);transform:translateY(-1px);}
  .ce-back img{height:18px;width:auto;display:block;}
  .ce-back .ar{font-family:var(--font-mono,monospace);opacity:.85;}
  @media (prefers-reduced-motion:reduce){.ce-back{transition:none;}}
</style>
</head>
<body>
<a class="ce-back" href="index.html" title="Back to the Eastport brand &amp; visual system">
  <img src="assets/logos/eastport-mark-white.png" alt="">
  <span class="ar">&larr;</span> Brand System
</a>
<div id="root"></div>
<script type="text/babel" src="explorations/design-canvas.jsx"></script>
<script type="text/babel" src="explorations/sections-color.jsx"></script>
<script type="text/babel" src="explorations/sections-micro.jsx"></script>
<script type="text/babel" src="explorations/sections-slides.jsx"></script>
<script type="text/babel" src="explorations/sections-web.jsx"></script>
<script type="text/babel" src="explorations/sections-map.jsx"></script>
<script type="text/babel">
const { DesignCanvas } = window;
function ExplorationsApp() {
  return (
    <DesignCanvas>
      {window.xColorSection()}
      {window.xMicroSection()}
      {window.xSlidesSection()}
      {window.xInvestorSection()}
      {window.xWebSection()}
      {window.xMapSection()}
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<ExplorationsApp />);
</script>
</body>
</html>
